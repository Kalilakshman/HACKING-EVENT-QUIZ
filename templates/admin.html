<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKING - Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <canvas id="matrix-canvas"></canvas>
    <div id="overlay">
        <div class="warning-text" id="warning-message">Violation Detected!</div>
    </div>

    <div class="container">
        <div class="card" id="admin-login-card" style="max-width: 400px;">
            <h1>ADMIN LOGIN</h1>
            <input type="password" id="admin-pass" placeholder="ADMIN PASSWORD"
                onkeypress="if(event.key==='Enter') adminLogin()">
            <button onclick="adminLogin()">ENTER DASHBOARD</button>
            <p id="admin-error" style="color: #ff3131; margin-top: 10px;"></p>
        </div>

        <div class="card" id="admin-dashboard-card" style="display: none; max-width: 900px;">
            <h1>ADMIN DASHBOARD</h1>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Team Name</th>
                        <th>Score</th>
                        <th>Correct</th>
                        <th>Wrong</th>
                        <th>Duration</th>
                    </tr>
                </thead>
                <tbody id="admin-results-body">
                </tbody>
            </table>
            <button onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/security.js') }}"></script>
    <script>
        async function adminLogin() {
            try {
                const pass = document.getElementById('admin-pass').value;
                const resp = await fetch('/admin_results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });

                const data = await resp.json();
                if (data.status === 'success') {
                    document.getElementById('admin-login-card').style.display = 'none';
                    document.getElementById('admin-dashboard-card').style.display = 'block';

                    const body = document.getElementById('admin-results-body');
                    body.innerHTML = '';
                    data.results.forEach(res => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                        <td>${res.team_name}</td>
                        <td>${res.score}</td>
                        <td>${res.correct_answers}</td>
                        <td>${res.wrong_answers}</td>
                        <td>${res.time_finished}</td>
                    `;
                        body.appendChild(tr);
                    });
                } else {
                    document.getElementById('admin-error').innerText = data.message || "Login failed";
                }
            } catch (err) {
                document.getElementById('admin-error').innerText = "Server error or connection failed.";
            }
        }
    </script>
</body>

</html>
